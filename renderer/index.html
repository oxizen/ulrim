<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>울림</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="titlebar">
    <div id="titlebar-drag">
      <img src="../assets/icon.png" class="titlebar-icon" alt="">
      <span class="titlebar-title">울림</span>
    </div>
    <div id="titlebar-controls">
      <button id="btn-minimize" class="titlebar-btn" title="Minimize">
        <svg width="10" height="1" viewBox="0 0 10 1"><rect width="10" height="1" fill="currentColor"/></svg>
      </button>
      <button id="btn-maximize" class="titlebar-btn" title="Maximize">
        <svg width="10" height="10" viewBox="0 0 10 10"><rect x="0.5" y="0.5" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1"/></svg>
      </button>
      <button id="btn-close" class="titlebar-btn titlebar-btn-close" title="Close">
        <svg width="10" height="10" viewBox="0 0 10 10"><line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1.2"/><line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
    </div>
  </div>
  <div id="app">
    <aside id="sidebar">
      <div id="preset-section">
        <div class="sidebar-header">
          <h3>Presets</h3>
          <button id="btn-new-preset" title="New preset">+</button>
        </div>
        <ul id="preset-list"></ul>
      </div>
      <div id="library-section">
        <div class="sidebar-header">
          <h3>Library</h3>
          <button id="btn-add-library" title="Add to library">+</button>
        </div>
        <ul id="library-list"></ul>
      </div>
    </aside>
    <main>
      <header>
        <h1 id="preset-title">울림</h1>
        <div class="controls">
          <div id="hid-status" class="hid-status disconnected" title="Click to reconnect">
            <span class="hid-dot"></span>
            <span class="hid-label">JX-11</span>
          </div>
          <button id="btn-stop-all" class="btn-stop" title="Stop all (Escape)" disabled>
            <svg width="14" height="14" viewBox="0 0 14 14"><rect x="1" y="1" width="12" height="12" rx="2" fill="currentColor"/></svg>
            Stop All
          </button>
        </div>
      </header>
      <div id="sections-container">
        <div class="section" id="section-sfx" data-section="sfx">
          <div class="section-header">
            <span class="section-title">효과음</span>
          </div>
          <div class="pad-grid" data-section="sfx"></div>
        </div>
        <div class="section" id="section-mr" data-section="mr">
          <div class="section-header">
            <span class="section-title">넘버 MR</span>
          </div>
          <div class="pad-grid" data-section="mr"></div>
        </div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
